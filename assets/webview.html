<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { font-family: -apple-system, sans-serif; margin: 0; padding: 4px; background: #111; color: #ccc; }
        .ide-shell { background: #1e1e1e; border-radius: 12px; border: 1px solid #2d2d2d; display: flex; flex-direction: column; overflow: hidden; position: relative; }
        .top-nav { background: #252526; padding: 8px 12px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #2d2d2d; }
        .tabs { display: flex; gap: 4px; }
        .tab-btn { background: #2d2d2d; color: #999; border: none; padding: 6px 12px; border-radius: 4px; font-size: 11px; font-weight: bold; }
        .tab-btn.active { background: #0e639c; color: white; }
        .workspace-body { width: 100%; height: 210px; background: #151515; }
        .view-pane { width: 100%; height: 100%; border: none; outline: none; box-sizing: border-box; display: none; font-family: monospace; font-size: 12px; padding: 10px; }
        .editor-textarea { background: #151515; color: #9cdcfe; resize: none; }
        .preview-box { background: white; }
        .diff-container { display: flex; background: #151515; font-size: 11px; overflow-y: auto; padding: 4px; gap: 4px; }
        .diff-box { width: 50%; padding: 4px; white-space: pre-wrap; word-break: break-all; background: #1a1a1a; font-family: monospace; }
        .added-line { background: rgba(76,175,80,0.18); color: #81c784; }
        .removed-line { background: rgba(244,67,54,0.18); color: #e57373; }
        .terminal-panel { background: #000; height: 75px; border-top: 1px solid #2d2d2d; font-family: monospace; font-size: 10px; color: #4af626; padding: 6px; overflow-y: auto; box-sizing: border-box; }
        .lint-panel { background: #252526; border-top: 1px solid #2d2d2d; padding: 6px 12px; font-size: 11px; display: flex; justify-content: space-between; align-items: center; }
        .push-btn { background: #2e7d32; color: white; border: none; padding: 5px 12px; border-radius: 4px; font-size: 11px; font-weight: bold; }
        
        /* COMMIT PANEL MODAL DECK SHEET OVERLAY */
        .commit-deck-modal { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); display: none; flex-direction: column; justify-content: center; align-items: center; padding: 16px; box-sizing: border-box; z-index: 999; }
        .modal-card { background: #252526; border: 1px solid #3c3c3c; width: 90%; max-width: 320px; border-radius: 8px; padding: 14px; box-shadow: 0 12px 36px rgba(0,0,0,0.6); }
        .modal-title { font-size: 12px; font-weight: bold; color: #fff; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 0.5px; }
        .modal-input { width: 100%; background: #1e1e1e; color: #fff; border: 1px solid #3c3c3c; padding: 6px; font-size: 11px; font-family: monospace; border-radius: 4px; box-sizing: border-box; margin-bottom: 8px; outline: none; }
        .modal-actions { display: flex; justify-content: flex-end; gap: 6px; margin-top: 4px; }
        .m-btn { border: none; padding: 5px 12px; font-size: 11px; font-weight: bold; border-radius: 4px; }
        .m-cancel { background: #444; color: #ccc; }
        .m-confirm { background: #0e639c; color: white; }
    </style>
</head>
<body>

<div class="ide-shell">
    <div class="top-nav">
        <span id="titleLabel" style="color: #4fc3f7; font-family: monospace; font-size: 11px;">Studio Workspace</span>
        <div class="tabs">
            <button id="tabEdit" class="tab-btn active" onclick="setView('EDIT')">Editor</button>
            <button id="tabRun" class="tab-btn" onclick="setView('RUN')">Live</button>
            <button id="tabDiff" class="tab-btn" onclick="setView('DIFF')">Diff</button>
        </div>
    </div>

    <div class="workspace-body">
        <textarea id="srcEditor" class="view-pane editor-textarea" style="display: block;" spellcheck="false" oninput="queueExecution()"></textarea>
        <iframe id="liveViewport" class="view-pane preview-box"></iframe>
        <div id="diffView" class="view-pane diff-container">
            <div class="diff-box" id="diffOriginal"></div>
            <div class="diff-box" id="diffModified" style="border-left: 1px solid #333;"></div>
        </div>
    </div>

    <div class="terminal-panel" id="consoleConsole"><div>📟 Console stream initialization clear...</div></div>

    <div class="lint-panel">
        <div>Status: <span id="lintBadge" style="color:#81c784;">● READY</span></div>
        <button class="push-btn" onclick="openCommitDeck()">Deploy Fixes</button>
    </div>

    <div id="commitDeck" class="commit-deck-modal">
        <div class="modal-card">
            <div class="modal-title">Git Release Commit Panel</div>
            <input type="text" id="commitBranchInput" class="modal-input" placeholder="Target isolated branch name" value="patch-validation-stream">
            <input type="text" id="commitMsgInput" class="modal-input" placeholder="Commit summary (e.g. feat: fix login UI)" value="refactor: optimized multi-framework source code layer">
            <div class="modal-actions">
                <button class="m-btn m-cancel" onclick="closeCommitDeck()">Cancel</button>
                <button class="m-btn m-confirm" onclick="triggerReleasePromotion()">Push Git Commit</button>
            </div>
        </div>
    </div>
</div>

<script>
    let debounceTimer = null;
    let baseContent = "";
    const urlParams = new URLSearchParams(window.location.search);
    const owner = urlParams.get('owner') || '';
    const repo = urlParams.get('repo') || '';
    const path = urlParams.get('path') || 'main.dart';
    const branch = urlParams.get('branch') || 'main';

    document.getElementById('titleLabel').innerText = `${repo} ❯ ${path}`;

    window.parent.postMessage({ type: "REQUEST_DB_LOAD", owner, repo, path }, "*");

    window.addEventListener('message', (e) => {
        if (e.data && e.data.type === "LOAD_DB_RESPONSE") {
            baseContent = e.data.remoteBase;
            document.getElementById('srcEditor').value = e.data.local || baseContent;
            runInlineLintCheck(document.getElementById('srcEditor').value);
        }
        if (e.data && e.data.type === 'CONSOLE_LOG') {
            document.getElementById('consoleConsole').innerHTML += `<div>🟢 log: ${e.data.val}</div>`;
        }
        if (e.data && e.data.type === 'CONSOLE_ERR') {
            document.getElementById('consoleConsole').innerHTML += `<div style="color:#ff5252;">🔴 err: ${e.data.val}</div>`;
        }
    });

    function queueExecution() {
        clearTimeout(debounceTimer);
        debounceTimer = setTimeout(() => {
            const text = document.getElementById('srcEditor').value;
            window.parent.postMessage({ type: "SYNC_LOCAL_CACHE", owner, repo, path, content: text }, "*");
            runInlineLintCheck(text);
            if(document.getElementById('liveViewport').style.display === 'block') hotReloadSandbox();
        }, 450);
    }

    function runInlineLintCheck(content) {
        const ext = path.split('.').pop().toLowerCase();
        const badge = document.getElementById('lintBadge');
        if (ext === 'dart' && (content.split('{').length !== content.split('}').length)) {
            badge.innerText = "❌ Bracket mismatch."; badge.style.color = "#e57373"; return;
        }
        badge.innerText = "✅ PASSED"; badge.style.color = "#81c784";
    }

    function hotReloadSandbox() {
        const code = document.getElementById('srcEditor').value;
        const ext = path.split('.').pop().toLowerCase();
        const viewport = document.getElementById('liveViewport');
        const inject = `<script>
            console.log = (...args) => { window.parent.postMessage({type:'CONSOLE_LOG', val: args.join(' ')}, '*'); };
            window.onerror = (m, u, l) => { window.parent.postMessage({type:'CONSOLE_ERR', val: m+' (Line '+l+')'}, '*'); };
        <\/script>`;
        if (ext === 'html') viewport.srcdoc = inject + code;
        else if (ext === 'js') viewport.srcdoc = inject + `<script>${code}<\/script>`;
        else if (ext === 'css') viewport.srcdoc = `<style>${code}</style>`;
    }

    function generateDiffView() {
        const currentLines = document.getElementById('srcEditor').value.split('\n');
        const baseLines = baseContent.split('\n');
        let origHTML = "", modHTML = "";
        const max = Math.max(baseLines.length, currentLines.length);

        for(let i=0; i<max; i++) {
            const bL = baseLines[i] !== undefined ? baseLines[i] : "";
            const cL = currentLines[i] !== undefined ? currentLines[i] : "";
            if (bL === cL) {
                origHTML += `<div>${escapeHtml(bL) || ' '}</div>`;
                modHTML += `<div>${escapeHtml(cL) || ' '}</div>`;
            } else {
                origHTML += bL !== "" ? `<div class="removed-line">- ${escapeHtml(bL)}</div>` : `<div>&nbsp;</div>`;
                modHTML += cL !== "" ? `<div class="added-line">+ ${escapeHtml(cL)}</div>` : `<div>&nbsp;</div>`;
            }
        }
        document.getElementById('diffOriginal').innerHTML = origHTML;
        document.getElementById('diffModified').innerHTML = modHTML;
    }

    function escapeHtml(str) { return str.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;"); }

    function setView(pane) {
        document.getElementById('tabEdit').classList.toggle('active', pane === 'EDIT');
        document.getElementById('tabRun').classList.toggle('active', pane === 'RUN');
        document.getElementById('tabDiff').classList.toggle('active', pane === 'DIFF');
        document.getElementById('srcEditor').style.display = pane === 'EDIT' ? 'block' : 'none';
        document.getElementById('liveViewport').style.display = pane === 'RUN' ? 'block' : 'none';
        document.getElementById('diffView').style.display = pane === 'DIFF' ? 'flex' : 'none';
        if (pane === 'RUN') hotReloadSandbox();
        if (pane === 'DIFF') generateDiffView();
    }

    function openCommitDeck() { document.getElementById('commitDeck').style.display = 'flex'; }
    function closeCommitDeck() { document.getElementById('commitDeck').style.display = 'none'; }

    function triggerReleasePromotion() {
        const targetBranch = document.getElementById('commitBranchInput').value;
        const commitMsg = document.getElementById('commitMsgInput').value;
        
        closeCommitDeck();
        document.getElementById('lintBadge').innerText = "COMMITTING FIXES...";
        document.getElementById('lintBadge').style.color = "#ffb74d";
        
        alert(`Parameters assigned! Tell the assistant: "execute push branch ${targetBranch} with message ${commitMsg}" to complete your upstream deployment.`);
    }
</script>
</body>
</html>
